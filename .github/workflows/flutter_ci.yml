# Dart analizi ve birim testleri (tam Android/NDK derlemesi yok).
name: Flutter CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # pubspec'teki model asset yolu analiz için var olmalı; repo .gitignore'da *.bin tutar.
      - name: Ensure GGML asset path exists for analyzer
        run: mkdir -p assets/models && touch assets/models/ggml-base-q5_1.bin

      - run: flutter analyze
      - run: flutter test
